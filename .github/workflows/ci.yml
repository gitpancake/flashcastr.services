name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --project apps/flash-engine/tsconfig.json --noEmit
      - run: npx tsc --project apps/image-engine/tsconfig.json --noEmit
      - run: npx tsc --project apps/database-engine/tsconfig.json --noEmit
      - run: npx tsc --project apps/neynar-engine/tsconfig.json --noEmit
      - run: npx tsc --project apps/api/tsconfig.json --noEmit
