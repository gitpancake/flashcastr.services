name: Deploy image-engine to Digital Ocean

on:
  push:
    branches: [main]
    paths:
      - "apps/image-engine/**"
      - "libs/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push Docker image
        run: |
          docker build \
            -f apps/image-engine/Dockerfile \
            -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/image-engine:${{ github.sha }} \
            -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/image-engine:latest \
            .
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/image-engine:${{ github.sha }}
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/image-engine:latest

      - name: Deploy to App Platform
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait
