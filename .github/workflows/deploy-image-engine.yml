name: Deploy image-engine

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/image-engine/**"
      - "libs/**"
      - "package.json"
      - "tsconfig.base.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/image-engine-app
            git pull origin main
            npm ci

            cat > .env << ENVEOF
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
            PINATA_JWT=${{ secrets.PINATA_JWT }}
            PROXY_LIST=${{ secrets.PROXY_LIST }}
            CONSUMER_CONCURRENCY=${{ secrets.CONSUMER_CONCURRENCY }}
            LOKI_URL=${{ secrets.LOKI_URL }}
            METRICS_PORT=9090
            NODE_ENV=production
            LOG_LEVEL=info
            ENVEOF

            pm2 restart image-engine || pm2 start apps/image-engine/ecosystem.config.cjs
            pm2 save
